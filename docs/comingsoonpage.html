<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Food Truck</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2212%22%20fill%3D%22%23f84c07%22/%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2216%22%20fill%3D%22white%22/%3E%3C/svg%3E"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Playwrite+NZ+Basic+Guides&family=Playwrite+NZ+Basic:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/dark-mode.css" />
    <link rel="stylesheet" href="./assets/css/rtl.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
  </head>
  <body>
    <section class="comingsoon-section">
      <div class="comingsoon-overlay"></div>

      <div class="container">
        <div class="comingsoon-content">
          <h1>Our Food Truck Website is Cooking</h1>

          <p>
            We are preparing something delicious. Our new website will launch
            very soon.
          </p>

          <!-- countdown -->

          <div class="comingsoon-timer">
            <div class="timer-box">
              <span id="days">00</span>
              <p>Days</p>
            </div>

            <div class="timer-box">
              <span id="hours">00</span>
              <p>Hours</p>
            </div>

            <div class="timer-box">
              <span id="minutes">00</span>
              <p>Minutes</p>
            </div>

            <div class="timer-box">
              <span id="seconds">00</span>
              <p>Seconds</p>
            </div>
          </div>

          <!-- email -->

          <div class="comingsoon-subscribe">
            <input type="email" placeholder="Enter your email" />

            <button>Notify Me</button>
          </div>

          <!-- buttons -->

          <div class="comingsoon-actions">
            <a href="./index.html" class="coming-btn">
              <i class="fa-solid fa-house"></i>
              Back Home
            </a>

            <a href="./menu.html" class="coming-btn-outline">
              <i class="fa-solid fa-burger"></i>
              View Menu
            </a>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
