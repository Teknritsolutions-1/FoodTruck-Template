<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/dark-mode.css" />
    <link rel="stylesheet" href="./assets/css/rtl.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <section class="premium-register">
      <div class="register-bg-shapes"></div>

      <div class="register-container">
        <div class="register-card">
          <h2>Create Account</h2>
          <p>Join our food truck community</p>

          <form>
            <div class="register-group">
              <input type="text" required />
              <label>Full Name</label>
            </div>

            <div class="register-group">
              <input type="email" required />
              <label>Email Address</label>
            </div>

            <div class="register-group password-group">
              <input type="password" required id="password" />
              <label>Password</label>

              <span class="toggle-password">
                <i class="fa-solid fa-eye"></i>
              </span>
            </div>

            <div class="register-group password-group">
              <input type="password" required id="confirmPassword" />
              <label>Confirm Password</label>

              <span class="toggle-password">
                <i class="fa-solid fa-eye"></i>
              </span>
            </div>

            <button class="register-btn">Create Account</button>

            <div class="register-divider">
              <span>or sign up with</span>
            </div>

            <div class="social-register">
              <button class="google">
                <i class="fa-brands fa-google"></i>
              </button>

              <button class="facebook">
                <i class="fa-brands fa-facebook-f"></i>
              </button>

              <button class="twitter">
                <i class="fa-brands fa-x-twitter"></i>
              </button>
            </div>

            <div class="login-link">
              Already have an account?
              <a href="login.html">Login</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
