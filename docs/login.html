<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2212%22%20fill%3D%22%23f84c07%22/%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2216%22%20fill%3D%22white%22/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/dark-mode.css" />
    <link rel="stylesheet" href="./assets/css/rtl.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <section class="premium-login">
      <div class="login-bg-shapes"></div>

      <div class="login-container">
        <div class="login-card">
          <div class="auth-logo">
            <a href="./index.html">
              <span class="logo-icon">
                <i class="fa-solid fa-truck-fast"></i>
              </span>
              <span class="logo-text">StreetBite</span>
            </a>
          </div>
          <h2>Welcome Back</h2>
          <p>Login to access your account</p>

          <form>
            <div class="login-group">
              <input type="email" required />
              <label>Email Address</label>
            </div>

            <div class="login-group">
              <input type="password" required />
              <label>Password</label>
            </div>

            <div class="login-options">
              <label class="remember">
                <input type="checkbox" />
                Remember me
              </label>

              <a href="#">Forgot Password?</a>
            </div>

            <button class="login-btn">Login</button>

            <div class="login-divider">
              <span>or continue with</span>
            </div>

            <div class="social-login">
              <button class="google">
                <i class="fa-brands fa-google"></i>
              </button>

              <button class="facebook">
                <i class="fa-brands fa-facebook-f"></i>
              </button>

              <button class="twitter">
                <i class="fa-brands fa-x-twitter"></i>
              </button>
            </div>

            <div class="login-register">
              Don’t have an account?
              <a href="./register.html">Create Account</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
